

services:
  mongo:
    image: mongo:6
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  redis:
    image: redis:alpine
    expose:
      - "6379"

  seed:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["npx", "tsx", "src/scripts/seed.ts"]
    environment:
      - MONGODB_URI=mongodb://mongo:27017/samadhan
    depends_on:
      mongo:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MONGODB_URI=mongodb://mongo:27017/samadhan
      - JWT_SECRET=super_secret_jwt_key
      - JWT_REFRESH_SECRET=super_secret_refresh_key
      - NEXT_PUBLIC_SOCKET_URL=/
      - INTERNAL_SOCKET_URL=http://worker:3001
      - MCD311_SIMULATE_FAILURE=false
    depends_on:
      mongo:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - MONGODB_URI=mongodb://mongo:27017/samadhan
      - REDIS_URL=redis://redis:6379
    expose:
      - "3001"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - worker

volumes:
  mongo_data:
